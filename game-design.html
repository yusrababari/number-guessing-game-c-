<script>
  const starsEl = document.getElementById('stars');
  const input = document.getElementById('num-input');
  const guessBtn = document.getElementById('guess-btn');
  const replayBtn = document.getElementById('replay-btn');
  const historyEl = document.getElementById('history');
  const hintEl = document.getElementById('hint');

  // Stars
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;
      --delay:${Math.random()*4}s;
      --op:${0.3+Math.random()*0.7}
    `;
    starsEl.appendChild(s);
  }

  let answer, attempts, maxAttempts = 10, maxRange = 100, best = null, gameOver;

  function resetGame() {
    attempts = 0;
    gameOver = false;
    answer = Math.floor(Math.random() * maxRange) + 1;

    input.value = '';
    input.disabled = false;
    guessBtn.disabled = false;

    replayBtn.classList.remove('show');
    historyEl.innerHTML = '';

    setHint('Type a number and press GUESS', '#7ee8a2', '#2a4a3a');

    document.getElementById('sub-text').textContent =
      `GUESS THE NUMBER BETWEEN 1 AND ${maxRange}`;

    input.max = maxRange;

    updateStats();
  }

  function setDiff(btn, att, range) {
    document.querySelectorAll('.diff-btn')
      .forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

    maxAttempts = att;
    maxRange = range;

    resetGame();
  }

  function setHint(msg, color, border) {
    hintEl.textContent = msg;
    hintEl.style.color = color;
    hintEl.style.borderColor = border;

    hintEl.classList.remove('pop');
    void hintEl.offsetWidth;
    hintEl.classList.add('pop');
  }

  function updateStats() {
    const pct = attempts / maxAttempts;

    document.getElementById('attempts-val').textContent =
      `${attempts}/${maxAttempts}`;

    document.getElementById('prog-label').textContent =
      `${attempts} / ${maxAttempts}`;

    const fill = document.getElementById('progress-fill');

    fill.style.width = `${pct * 100}%`;
    fill.style.background =
      pct < 0.5 ? '#5b4fcf'
      : pct < 0.8 ? '#f59e0b'
      : '#ef4444';

    document.getElementById('best-val').textContent =
      best ?? '---';
  }

  function addHistory(guess, hint) {
    const item = document.createElement('div');

    item.className = 'history-item';
    item.textContent = `[${attempts}] ${guess} → ${hint}`;

    historyEl.prepend(item);
  }

  function makeGuess() {
    if (gameOver) return;

    const val = parseInt(input.value);

    if (!val || val < 1 || val > maxRange) {
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      return;
    }

    attempts++;
    updateStats();

    const diff = Math.abs(val - answer);

    if (val === answer) {
      setHint(`CORRECT! The answer was ${answer}!`, '#a78bfa', '#4a3a9a');

      if (best === null || attempts < best)
        best = attempts;

      addHistory(val, 'CORRECT!');
      return endGame();
    }

    if (attempts >= maxAttempts) {
      setHint(`GAME OVER. Answer was ${answer}.`, '#ef4444', '#6a2a2a');

      addHistory(val, 'OUT OF TRIES');
      return endGame();
    }

    let msg, color, border;

    if (diff <= Math.ceil(maxRange * 0.05)) {
      msg = val < answer
        ? 'BURNING HOT! Go higher!'
        : 'BURNING HOT! Go lower!';

      color = '#f87171';
      border = '#6a2a2a';

    } else if (diff <= Math.ceil(maxRange * 0.15)) {
      msg = val < answer
        ? 'Warm... try higher'
        : 'Warm... try lower';

      color = '#fbbf24';
      border = '#6a4a0a';

    } else {
      msg = val < answer
        ? 'Cold. Go much higher.'
        : 'Cold. Go much lower.';

      color = '#7ee8a2';
      border = '#2a4a3a';
    }

    setHint(msg, color, border);

    addHistory(val, msg);

    input.value = '';
    input.focus();
  }

  function endGame() {
    gameOver = true;

    input.disabled = true;
    guessBtn.disabled = true;

    replayBtn.classList.add('show');

    updateStats();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') makeGuess();
  });

  resetGame();
</script>
